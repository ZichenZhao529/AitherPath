client_id: client_b
source:
  system: client_b
  tables:
  - customers
  - orders
  format: csv
schedule:
  frequency: daily
  trigger: batch
transformations:
  customers:
  - target_table: unified_customers
    target_field: customer_id
    source_field: id_pelanggan
    transform_type: renaming
    transformation_rule: customer_id = id_pelanggan
  - target_table: unified_customers
    target_field: full_name
    source_field: nama
    transform_type: renaming
    transformation_rule: full_name = nama
  - target_table: unified_customers
    target_field: first_name
    source_field: nama
    transform_type: splitting
    transformation_rule: Split nama by spaces; first_name = first token. If nama contains
      only one token, assign that token to first_name and set last_name to empty/null.
  - target_table: unified_customers
    target_field: last_name
    source_field: nama
    transform_type: splitting
    transformation_rule: Split nama by spaces; last_name = all tokens after the first
      joined by a single space. If nama contains only one token, set last_name to
      empty/null.
  - target_table: unified_customers
    target_field: email
    source_field: email
    transform_type: direct_mapping
    transformation_rule: email = email
  - target_table: unified_customers
    target_field: phone
    source_field: no_hp
    transform_type: direct_mapping
    transformation_rule: phone = no_hp
  - target_table: unified_customers
    target_field: registration_date
    source_field: tgl_daftar
    transform_type: date_format_conversion
    transformation_rule: Parse tgl_daftar using source formats 'DD/MM/YYYY' or 'DD-MM-YYYY';
      convert to target format 'YYYY-MM-DD'. If parsing fails or date is invalid (e.g.
      31/02/2024), set registration_date to null and flag for data quality review.
  - target_table: unified_customers
    target_field: city
    source_field: kota
    transform_type: renaming
    transformation_rule: city = kota
  - target_table: unified_customers
    target_field: country
    source_field: null
    transform_type: default_value
    transformation_rule: country = null
  - target_table: unified_customers
    target_field: source_system
    source_field: null
    transform_type: default_value
    transformation_rule: source_system = 'client_b'
  orders:
  - target_table: unified_orders
    target_field: order_id
    source_field: no_pesanan
    transform_type: renaming
    transformation_rule: order_id = no_pesanan
  - target_table: unified_orders
    target_field: customer_id
    source_field: id_pelanggan
    transform_type: renaming
    transformation_rule: customer_id = id_pelanggan
  - target_table: unified_orders
    target_field: order_date
    source_field: tgl_pesan
    transform_type: date_format_conversion
    transformation_rule: Parse tgl_pesan using source formats 'DD-MM-YYYY' or 'DD/MM/YYYY';
      convert to target format 'YYYY-MM-DD'. If parsing fails, set order_date to null.
  - target_table: unified_orders
    target_field: amount
    source_field: total_harga
    transform_type: renaming
    transformation_rule: amount = cast(total_harga as decimal(18,2))
  - target_table: unified_orders
    target_field: currency
    source_field: mata_uang
    transform_type: renaming
    transformation_rule: currency = mata_uang
  - target_table: unified_orders
    target_field: amount_usd
    source_field: total_harga
    transform_type: calculated_field
    transformation_rule: 'amount_usd = if mata_uang = ''USD'' then cast(total_harga
      as decimal(18,2)) else if exchange_rate_to_usd exists for mata_uang and order_date
      then round(total_harga * exchange_rate_to_usd, 2) else null. Pseudocode: rate
      = lookup_fx_rate(mata_uang, order_date, ''USD''); if rate is not null then amount_usd
      = round(total_harga * rate, 2) else amount_usd = null.'
  - target_table: unified_orders
    target_field: order_status
    source_field: status_pesanan
    transform_type: value_translation
    transformation_rule: 'Translate status_pesanan to standardized vocabulary: ''terkirim''
      -> ''delivered'', ''menunggu'' -> ''pending'', ''dibatalkan'' -> ''cancelled''.
      If an unmapped value appears, preserve original value or route to review according
      to pipeline policy.'
  - target_table: unified_orders
    target_field: shipping_address
    source_field: alamat_kirim
    transform_type: renaming
    transformation_rule: shipping_address = alamat_kirim
  - target_table: unified_orders
    target_field: source_system
    source_field: null
    transform_type: default_value
    transformation_rule: source_system = 'client_b'
destination:
  schema: unified_schema
  tables:
  - unified_customers
  - unified_orders
quality_checks:
- check_type: required_fields
  rules:
    unified_customers:
    - customer_id
    - full_name
    unified_orders:
    - order_id
    - customer_id
    - amount
- check_type: date_format
  fields:
  - registration_date
  - order_date
  expected_format: YYYY-MM-DD
- check_type: non_negative_amount
  table: unified_orders
  field: amount
- check_type: currency_code_normalization
  table: unified_orders
  field: currency
