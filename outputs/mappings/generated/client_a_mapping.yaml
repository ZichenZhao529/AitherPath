client_id: client_a

source_tables:
  - customers
  - orders

target_tables:
  - unified_customers
  - unified_orders

mappings:
  - target_table: unified_customers
    target_field: customer_id
    source_table: customers
    source_field: cust_id
    transform_type: renaming
    transformation_rule: "customer_id = cust_id"
    example:
      input: "C001"
      output: "C001"

  - target_table: unified_customers
    target_field: full_name
    source_table: customers
    source_field: full_name
    transform_type: direct_mapping
    transformation_rule: "full_name = full_name"
    example:
      input: "John Smith"
      output: "John Smith"

  - target_table: unified_customers
    target_field: first_name
    source_table: customers
    source_field: full_name
    transform_type: splitting
    transformation_rule: "Split full_name on spaces; first_name = first token. If full_name is null or empty, set first_name = null."
    example:
      input: "Mary Jane"
      output: "Mary"
    notes: "Simple space-based split per client_a requirement. For multi-part names, only the first token is assigned to first_name."

  - target_table: unified_customers
    target_field: last_name
    source_table: customers
    source_field: full_name
    transform_type: splitting
    transformation_rule: "Split full_name on spaces; last_name = join all tokens after the first with a single space. If only one token exists, set last_name = null."
    example:
      input: "John Smith"
      output: "Smith"
    notes: "Simple space-based split per client_a requirement. Handles multi-part surnames by joining remaining tokens."

  - target_table: unified_customers
    target_field: email
    source_table: customers
    source_field: email_addr
    transform_type: renaming
    transformation_rule: "email = email_addr"
    example:
      input: "john@gmail.com"
      output: "john@gmail.com"

  - target_table: unified_customers
    target_field: phone
    source_table: customers
    source_field: phone
    transform_type: direct_mapping
    transformation_rule: "phone = phone"
    example:
      input: "(646) 555-0199"
      output: "(646) 555-0199"

  - target_table: unified_customers
    target_field: registration_date
    source_table: customers
    source_field: signup_dt
    transform_type: date_format_conversion
    transformation_rule: "Parse signup_dt as source format YYYY-MM-DD and output as target date format YYYY-MM-DD. If parsing fails, set registration_date = null."
    example:
      input: "2024-01-15"
      output: "2024-01-15"

  - target_table: unified_customers
    target_field: city
    source_table: customers
    source_field: null
    transform_type: default_value
    transformation_rule: "city = null"
    example:
      input: null
      output: null
    notes: "client_a customers table does not contain a customer city field."

  - target_table: unified_customers
    target_field: country
    source_table: customers
    source_field: null
    transform_type: default_value
    transformation_rule: "country = null"
    example:
      input: null
      output: null
    notes: "client_a customers table does not contain a customer country field."

  - target_table: unified_customers
    target_field: source_system
    source_table: customers
    source_field: null
    transform_type: default_value
    transformation_rule: "source_system = 'client_a'"
    example:
      input: null
      output: "client_a"

  - target_table: unified_orders
    target_field: order_id
    source_table: orders
    source_field: order_no
    transform_type: renaming
    transformation_rule: "order_id = order_no"
    example:
      input: "ORD-10001"
      output: "ORD-10001"

  - target_table: unified_orders
    target_field: customer_id
    source_table: orders
    source_field: cust_id
    transform_type: renaming
    transformation_rule: "customer_id = cust_id"
    example:
      input: "C001"
      output: "C001"

  - target_table: unified_orders
    target_field: order_date
    source_table: orders
    source_field: order_date
    transform_type: date_format_conversion
    transformation_rule: "Attempt to parse order_date using source formats YYYY-MM-DD and YYYY/MM/DD; output as target date format YYYY-MM-DD. Validate calendar dates; if parsing or validation fails, set order_date = null."
    example:
      input: "2024-06-01"
      output: "2024-06-01"
    notes: "Sample contains malformed value '2024/13/01'; invalid month should result in null."

  - target_table: unified_orders
    target_field: amount
    source_table: orders
    source_field: total_amt
    transform_type: renaming
    transformation_rule: "amount = round(total_amt, 2)"
    example:
      input: 45.5
      output: 45.50

  - target_table: unified_orders
    target_field: currency
    source_table: orders
    source_field: null
    transform_type: default_value
    transformation_rule: "currency = 'USD'"
    example:
      input: null
      output: "USD"
    notes: "Per client_a requirement, default currency is USD when no explicit currency field is provided."

  - target_table: unified_orders
    target_field: amount_usd
    source_table: orders
    source_field: total_amt
    transform_type: calculated_field
    transformation_rule: "If currency == 'USD' then amount_usd = round(total_amt, 2); otherwise amount_usd = round(total_amt * fx_rate_to_usd, 2). For client_a, currency defaults to 'USD', so amount_usd = round(total_amt, 2)."
    example:
      input:
        total_amt: 129.99
        currency: "USD"
      output: 129.99
    notes: "Directly mapped from total_amt for client_a because default currency is USD."

  - target_table: unified_orders
    target_field: order_status
    source_table: orders
    source_field: status
    transform_type: value_translation
    transformation_rule: "Translate source status to standardized vocabulary: delivered -> delivered, pending -> pending, cancelled -> cancelled. If an unexpected value appears, retain the original trimmed lowercase value."
    example:
      input: "cancelled"
      output: "cancelled"

  - target_table: unified_orders
    target_field: shipping_address
    source_table: orders
    source_field: shipping_addr
    transform_type: renaming
    transformation_rule: "shipping_address = shipping_addr"
    example:
      input: "123 Main St, NYC"
      output: "123 Main St, NYC"

  - target_table: unified_orders
    target_field: source_system
    source_table: orders
    source_field: null
    transform_type: default_value
    transformation_rule: "source_system = 'client_a'"
    example:
      input: null
      output: "client_a"