client_id: client_c

source_tables:
  - customers
  - orders

target_tables:
  - unified_customers
  - unified_orders

mappings:
  - target_table: unified_customers
    target_field: customer_id
    source_table: customers
    source_field: Kundennummer
    transform_type: renaming
    transformation_rule: "customer_id = Kundennummer"
    example:
      input: "KD-20001"
      output: "KD-20001"

  - target_table: unified_customers
    target_field: full_name
    source_table: customers
    source_field: "Vorname, Nachname"
    transform_type: concatenation
    transformation_rule: "full_name = trim(concat(Vorname, ' ', Nachname))"
    example:
      input:
        Vorname: "Hans"
        Nachname: "Müller"
      output: "Hans Müller"
    notes: "Assumes both first and last name are present. If one component is null, return the non-null component after trimming extra spaces."

  - target_table: unified_customers
    target_field: first_name
    source_table: customers
    source_field: Vorname
    transform_type: renaming
    transformation_rule: "first_name = Vorname"
    example:
      input: "Sophie"
      output: "Sophie"

  - target_table: unified_customers
    target_field: last_name
    source_table: customers
    source_field: Nachname
    transform_type: renaming
    transformation_rule: "last_name = Nachname"
    example:
      input: "Dubois"
      output: "Dubois"

  - target_table: unified_customers
    target_field: email
    source_table: customers
    source_field: E-Mail
    transform_type: renaming
    transformation_rule: "email = E-Mail"
    example:
      input: "hans.m@web.de"
      output: "hans.m@web.de"

  - target_table: unified_customers
    target_field: phone
    source_table: customers
    source_field: Telefon
    transform_type: format_cleanup
    transformation_rule: "phone = if Telefon is null then null else normalize_phone(Telefon) by removing spaces, hyphens, and non-numeric separators while preserving a leading '+'; examples: '+49-30-12345' -> '+493012345', '+33-1-23456' -> '+33123456'"
    example:
      input: "+49-30-12345"
      output: "+493012345"
    notes: "Applies project-standard phone normalization rather than preserving raw source formatting. Null source values remain null."

  - target_table: unified_customers
    target_field: registration_date
    source_table: customers
    source_field: Registrierungsdatum
    transform_type: date_format_conversion
    transformation_rule: "registration_date = parse_date(Registrierungsdatum, source_format='yyyy.MM.dd', target_format='yyyy-MM-dd'); if parsing fails, set to null"
    example:
      input: "2024.01.15"
      output: "2024-01-15"

  - target_table: unified_customers
    target_field: city
    source_table: customers
    source_field: null
    transform_type: default_value
    transformation_rule: "city = null"
    example:
      input: null
      output: null
    notes: "Client C customers table does not contain a customer city field."

  - target_table: unified_customers
    target_field: country
    source_table: customers
    source_field: Land
    transform_type: format_cleanup
    transformation_rule: "country = upper(trim(Land))"
    example:
      input: "de"
      output: "DE"
    notes: "Standardizes country codes using trimming and uppercase normalization."

  - target_table: unified_customers
    target_field: source_system
    source_table: customers
    source_field: null
    transform_type: default_value
    transformation_rule: "source_system = 'client_c'"
    example:
      input: null
      output: "client_c"

  - target_table: unified_orders
    target_field: order_id
    source_table: orders
    source_field: Bestellnummer
    transform_type: renaming
    transformation_rule: "order_id = Bestellnummer"
    example:
      input: "B-2024-0601"
      output: "B-2024-0601"

  - target_table: unified_orders
    target_field: customer_id
    source_table: orders
    source_field: Kundennummer
    transform_type: renaming
    transformation_rule: "customer_id = Kundennummer"
    example:
      input: "KD-20001"
      output: "KD-20001"

  - target_table: unified_orders
    target_field: order_date
    source_table: orders
    source_field: Bestelldatum
    transform_type: date_format_conversion
    transformation_rule: "order_date = parse_date(Bestelldatum, source_format='dd.MM.yyyy', target_format='yyyy-MM-dd'); if parsing fails or date is invalid (for example month 13), set to null"
    example:
      input: "15.01.2024"
      output: "2024-01-15"
    notes: "Sample data includes invalid value '31.13.2024'; such records should produce null after validation."

  - target_table: unified_orders
    target_field: amount
    source_table: orders
    source_field: Gesamtbetrag
    transform_type: renaming
    transformation_rule: "amount = round(Gesamtbetrag, 2)"
    example:
      input: 38.5
      output: 38.50

  - target_table: unified_orders
    target_field: currency
    source_table: orders
    source_field: Währung
    transform_type: format_cleanup
    transformation_rule: "currency = upper(trim(Währung))"
    example:
      input: " eur "
      output: "EUR"
    notes: "Standardizes currency codes using trimming and uppercase normalization."

  - target_table: unified_orders
    target_field: amount_usd
    source_table: orders
    source_field: "Gesamtbetrag, Währung"
    transform_type: calculated_field
    transformation_rule: "amount_usd = if Gesamtbetrag is null or Währung is null then null else round(Gesamtbetrag * exchange_rate_to_usd(upper(trim(Währung)), order_date), 2); pseudocode: curr = upper(trim(Währung)); rate = exchange_rate_to_usd(curr, order_date); if rate is null then null else round(Gesamtbetrag * rate, 2)"
    example:
      input:
        Gesamtbetrag: 109.99
        Währung: "EUR"
        order_date: "2024-01-15"
        exchange_rate_to_usd: 1.10
      output: 120.99
    notes: "Uses normalized currency code and agreed exchange-rate process. If no rate is available for the currency/date combination, return null."

  - target_table: unified_orders
    target_field: order_status
    source_table: orders
    source_field: Bestellstatus
    transform_type: value_translation
    transformation_rule: "order_status = translate(Bestellstatus): 'Geliefert' -> 'delivered', 'Ausstehend' -> 'pending', 'Storniert' -> 'cancelled'; otherwise retain null for unmapped or missing values"
    example:
      input: "Storniert"
      output: "cancelled"
    notes: "German order statuses are translated into the standardized project vocabulary. Uses 'cancelled' spelling consistently."

  - target_table: unified_orders
    target_field: shipping_address
    source_table: orders
    source_field: Lieferadresse
    transform_type: renaming
    transformation_rule: "shipping_address = Lieferadresse"
    example:
      input: "Berliner Str. 7, Berlin"
      output: "Berliner Str. 7, Berlin"

  - target_table: unified_orders
    target_field: source_system
    source_table: orders
    source_field: null
    transform_type: default_value
    transformation_rule: "source_system = 'client_c'"
    example:
      input: null
      output: "client_c"